# Render blueprint — Tacit confidential-pool relay + reflection backbone.
#
# Proving is offloaded to the Succinct NETWORK prover; no GPU on Render. Two always-on
# Background Workers (reflection + settle) plus two Cron Jobs (replenish + monitor).
#
# The prebuilt Rust prover binaries (bitcoin_prove, exec) are baked into the image by
# the Dockerfile (see README). Secrets are sync:false — set them in the Render dashboard.
#
# Shared env lives in an env group so every service inherits WORKER_BASE / RPC_URL /
# addresses / Succinct config without repetition; only the secrets differ per-need.

envVarGroups:
  - name: tacit-relay-shared
    envVars:
      - key: WORKER_BASE
        value: https://api.tacit.finance   # control-plane worker base URL
      - key: NETWORK
        value: mainnet
      - key: CHAIN_ID
        value: "1"
      - key: POOL_ADDR
        value: "0x0000000000c5B537A7c3622d1418D5771914C03D"
      - key: VAPP_DEPOSIT_ADDR
        value: "0x5Ad5Bc4B18f7c173DcE17A57682Cb0Dc8788951F"
      - key: PROVE_TOKEN_ADDR
        value: "0x6BEF15D938d4E72056AC92Ea4bDD0D76B1C4ad29"
      - key: ZQUOTER_ADDR
        value: "0x000000a7DfdD39f4D74c7b201501eaD119F8b86C"
      - key: ZROUTER_ADDR
        value: "0x000000000000FB114709235f1ccBFfb925F600e4"
      - key: SP1_PROVER
        value: network
      # Mainnet/auction endpoint. The exec-* binaries build in Mainnet (auction) mode — auction gRPC calls
      # (get_proof_request_params) are Unimplemented on the Reserved endpoint (rpc.production), so this MUST be
      # the mainnet host or every network prove fails with `status: Unimplemented`.
      - key: NETWORK_RPC_URL
        value: https://rpc.mainnet.succinct.xyz
      - key: BITCOIN_PROVE_BIN
        value: /app/prover/bin/bitcoin_prove
      - key: EXEC_BIN
        value: /app/prover/bin/exec
      # Fee economics (PRICING-RELAY-ECONOMICS.md)
      - key: MIN_FLOOR_USD
        value: "0.5"
      - key: OPS_MARGIN
        value: "0.12"
      - key: BPS_CAP
        value: "30"
      # ── Secrets (set in dashboard) ──
      - key: RPC_URL
        sync: false
      - key: RELAY_KEY
        sync: false
      - key: BOX_TOKEN
        sync: false
      - key: NETWORK_PRIVATE_KEY
        sync: false

services:
  # Cron ($ = runtime only): incremental Bitcoin-state reflection attester. A 5-min cron keeps
  # pace with Bitcoin's ~10-min blocks (lag ≪ the ~60-min maturity window) — no always-on worker
  # needed. RUN_MODE=cron drains pending batches then exits. Switch type→worker for zero-lag.
  - type: cron
    name: tacit-reflection
    runtime: docker
    rootDir: worker-relay
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: node src/reflection-folder.js
    autoDeploy: false
    envVars:
      - fromGroup: tacit-relay-shared
      - key: RUN_MODE
        value: cron

  # Cron: BitcoinLightRelay header feeder — submits BTC headers (advanceTip) so the relay confirms blocks
  # ahead of reflection. No proving; just fetch headers + one on-chain tx. Paced to stay ≤ HEADER_RELAY_LEAD
  # ahead of reflection's attested height (maturity-window constraint). */3 keeps it moving through the catch-up.
  - type: cron
    name: tacit-header
    runtime: docker
    rootDir: worker-relay
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/3 * * * *"
    dockerCommand: node src/header-relay.js
    autoDeploy: false
    envVars:
      - fromGroup: tacit-relay-shared
      - key: RUN_MODE
        value: cron

  # Always-on worker: confidential settle relay (user ops). Polls the queue every SETTLE_POLL_SECS (~15s)
  # and proves+settles immediately — no 2-min cron lag, so a user's wrap/send/top-up settles promptly.
  # (Revert to a per-run Cron Job by setting type: cron + schedule + RUN_MODE=cron if cost matters more.)
  - type: worker
    name: tacit-settle
    runtime: docker
    rootDir: worker-relay
    dockerfilePath: ./Dockerfile
    # Standard (2GB): the SP1 network-prove client spikes past 512MB (Starter) when it retrieves + deserializes
    # the groth16 proof, which OOM-killed the instance mid-proof on Starter. 2GB clears it.
    plan: standard
    dockerCommand: node src/settle-relay.js
    autoDeploy: false
    envVars:
      - fromGroup: tacit-relay-shared
      - key: SETTLE_JOB_TIMEOUT_SECS
        value: "900"
      # Tight poll so a queued job starts proving within ~3s instead of up to 15s — the worker is always-on, so
      # the extra idle GETs are cheap and shave real latency off every user prove.
      - key: SETTLE_POLL_SECS
        value: "3"
      # Ceiling, not a target: the relay batches whatever is already queued and never waits to fill, so a
      # lone op still settles immediately on the single-op path. Gas is charged per settle, so batch members
      # split it (proving is per-op and does not amortize). 1 disables batching.
      - key: SETTLE_BATCH_MAX
        value: "8"
      # Ordered PRIVATE submission endpoints. A settle carries a proof whose bound fee is stealable in a
      # public mempool, and one endpoint refusing a valid tx would otherwise discard an already-paid proof.
      - key: SETTLE_RPC_URLS
        value: "https://rpc.flashbots.net,https://rpc.mevblocker.io"
      # Last resort after every private endpoint refuses: the user's op still settles, at the risk of a
      # searcher taking the bound fee. 0 keeps submission private-only.
      - key: SETTLE_ALLOW_PUBLIC
        value: "1"
      # optional: separate signer for settle gas (falls back to RELAY_KEY)
      - key: SETTLE_KEY
        sync: false

  # Cron: sweep fees → PROVE + ETH, deposit PROVE to the vApp.
  - type: cron
    name: tacit-replenish
    runtime: docker
    rootDir: worker-relay
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/30 * * * *"
    dockerCommand: node src/replenish.js
    autoDeploy: false
    envVars:
      - fromGroup: tacit-relay-shared
      # Underlying tokens the relay converts to PROVE. The settle fee arrives as the
      # underlying (ETH / escrow ERC20 / minted canonical), so no unwrap leg. address(0) =
      # native ETH (surplus over the gas buffer only). TAC is intentionally omitted — held.
      # Order: ETH, USDC, USDT, wstETH.
      - key: FEE_ASSETS
        value: "0x0000000000000000000000000000000000000000,0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48,0xdAC17F958D2ee523a2206206994597C13D831ec7,0x7f39C581F595B53c5cb19bD0b3f8dA6c935E2Ca0"
      - key: SLIPPAGE_BPS
        value: "100"
      - key: PROVE_PRICE_USD
        value: "0.19"
      - key: ETH_PRICE_USD
        value: "1840"

  # Cron: balance + reflection-lag pager.
  - type: cron
    name: tacit-monitor
    runtime: docker
    rootDir: worker-relay
    dockerfilePath: ./Dockerfile
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: node src/balance-monitor.js
    autoDeploy: false
    envVars:
      - fromGroup: tacit-relay-shared
      - key: PROVE_BALANCE_FLOOR
        value: "50"
      - key: ETH_GAS_BUFFER_WEI
        value: "30000000000000000"
      - key: REFLECTION_LAG_ALERT_BLOCKS
        value: "6"
      - key: ALERT_WEBHOOK_URL
        sync: false
