name = "tacit-pin"
main = "src/index.js"
compatibility_date = "2024-12-01"

# UPLOAD_KV — per-IP rate limits for /pin uploads
[[kv_namespaces]]
binding = "UPLOAD_KV"
id = "03383c435594414f88b9799be252adf7"

# REGISTRY_KV — asset directory entries + faucet rate-limit counters
[[kv_namespaces]]
binding = "REGISTRY_KV"
id = "0079941fcc274de191d6b69a67f0ba72"

# Cron: scan signet AND mainnet for new tacit etches every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

[vars]
# CORS allowlist (comma-separated). "*" allows any origin.
# Public production origins only. For local dev, temporarily prepend your
# dev origins here without committing: e.g.
#   "http://localhost:8000,http://127.0.0.1:8000,null,<existing list…>"
# `null` covers file:// loads. Localhost CORS has near-zero security value
# anyway (the worker's mutating endpoints are signature-gated and the
# read endpoints serve public data), so keeping the deployed list clean
# is a hygiene improvement, not a security fix.
ALLOWED_ORIGINS = "https://tacit.finance,https://www.tacit.finance,https://tacitscan.io,https://www.tacitscan.io,https://tacit-ioq0.onrender.com,https://tacit.wei.is"

# Per-IP /pin uploads per UTC day
DAILY_LIMIT = "20"

# Per-file size cap for /pin (bytes)
MAX_BYTES = "2097152"

# Faucet drip amount (sats per request)
DRIP_SATS = "20000"

# Bitcoin signet API base URL
SIGNET_API = "https://mempool.space/signet/api"

# Bitcoin mainnet API base URL (Discover indexer scans both networks)
MAINNET_API = "https://mempool.space/api"

# Cron blocks-per-tick. Signet blocks are near-empty so we can scan many per
# tick; mainnet blocks have ~3000 txs each (paginated 25/page on mempool.space)
# so a single block burns ~120 subrequests. Keep mainnet small to fit Worker
# subrequest budgets; the /assets/hint endpoint covers user-broadcast etches
# instantly regardless.
SCAN_BLOCKS_SIGNET = "5"
SCAN_BLOCKS_MAINNET = "1"

# Faucet rate limits per UTC day
FAUCET_IP_LIMIT = "1"
FAUCET_ADDR_LIMIT = "1"

# Airdrop claim-queue rate limits (per UTC day). Defaults in code are tuned
# for a 50-recipient hobby drop; production drops with thousands of recipients
# need these raised. The defaults bite hardest on:
#   1. AIRDROP_DAILY_LIMIT_ROOT_IP — the issuer's daemon/dapp DELETEs each
#      fulfilled leaf from this IP. For a 3000-recipient drop in batches of 7
#      that's ~430 DELETEs. Default 50 throttles after ~7 batches.
#   2. AIRDROP_DAILY_LIMIT — claimants on shared IPs (mobile carriers, corp
#      NATs) collide on the per-IP global. Default 200 is fine until a single
#      IP fronts hundreds of users.
#   3. AIRDROP_DAILY_LIMIT_ROOT_PUBKEY — a recipient who retries their POST
#      after re-tipping (treasury fund flow) hits this; default 25 allows ~12
#      tip-retry cycles, raise if expecting volatile fee markets / many resubmits.
# Soundness is not affected: the daemon's anti-double-pay still applies. These
# only control how aggressively the worker throttles legitimate traffic.
AIRDROP_DAILY_LIMIT = "500"
AIRDROP_DAILY_LIMIT_ROOT_IP = "5000"
AIRDROP_DAILY_LIMIT_PUBKEY = "200"
AIRDROP_DAILY_LIMIT_ROOT_PUBKEY = "50"
