name = "tacit-pin"
main = "src/index.js"
compatibility_date = "2024-12-01"
# Explicit because declaring `routes` flips wrangler's default to false —
# a deploy with routes present (even one that then fails to attach them)
# silently drops the workers.dev binding, which is the dapp's API origin.
# Keep true unless the API itself moves behind a zone route.
workers_dev = true

# Edge-compressed dapp bundle (handleDappBundle in src/index.js).
# Uncomment to route /tacit.js through the worker, which serves the
# brotli-q11 copy uploaded to REGISTRY_KV by the build (build/build.mjs
# prints the matching `wrangler kv key put` command alongside the ?cb
# token). Every non-matching request passes through to the static origin
# unchanged, so the route is safe to enable before or after the KV
# upload. Requires the tacit.finance zone on this Cloudflare account.
# routes = [
#   { pattern = "tacit.finance/tacit.js*", zone_name = "tacit.finance" },
#   { pattern = "www.tacit.finance/tacit.js*", zone_name = "tacit.finance" },
# ]
# NOTE (2026-06-04): enabling these requires onboarding the tacit.finance
# zone to this Cloudflare account first — DNS currently lives at the
# registrar (registrar-servers.com) pointing directly at Render, so
# `wrangler deploy` rejects the route with error 10083. The KV artifact
# (dapp:tacit.js.br) and the handler are deployed and waiting; once the
# zone exists here, uncommenting + `wrangler deploy` completes the flip.
# When uncommenting, KEEP workers_dev = true above — see its comment.

# UPLOAD_KV — per-IP rate limits for /pin uploads
[[kv_namespaces]]
binding = "UPLOAD_KV"
id = "03383c435594414f88b9799be252adf7"

# REGISTRY_KV — asset directory entries + faucet rate-limit counters
[[kv_namespaces]]
binding = "REGISTRY_KV"
id = "0079941fcc274de191d6b69a67f0ba72"

# Cron: scan signet AND mainnet for new tacit etches every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Workers Analytics Engine — per-request observability without instrumenting
# Cloudflare's account-wide metrics. Free tier covers 10M datapoints/mo;
# the worker samples 1-in-N requests (see _logAnalytics in src/index.js)
# to stay comfortably under the cap. Queryable via the SQL API or the
# Cloudflare dashboard. Used to identify the next round of hot paths
# without guessing.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "tacit_worker"

[vars]
# CORS allowlist (comma-separated). "*" allows any origin.
ALLOWED_ORIGINS = "https://tacit.finance,https://www.tacit.finance,https://tacitscan.io,https://www.tacitscan.io,https://tacit-ioq0.onrender.com,https://tacit.wei.is,http://localhost:8765,http://localhost:5173,http://localhost:3000,http://localhost:8080,http://127.0.0.1:8765,http://127.0.0.1:5173,http://127.0.0.1:3000,http://127.0.0.1:8080"

# Per-IP /pin uploads per UTC day (also gates governance proposal creation)
DAILY_LIMIT = "20"

# Governance (off-chain TAC DAO). All optional:
#   GOV_PROPOSE_MIN_BASE — base-unit floor (8-dec) a proposer must prove to open
#     a proposal; defaults to 100 TAC (10000000000) if unset.
#   GOV_TAC_ERC20_<NET>  — canonical TAC ERC20 address per network. Until set,
#     the PUBLIC (Ethereum) voting path returns 501; the PRIVATE (Bitcoin
#     threshold-proof) path works regardless. TAC ERC20 is not live yet, so
#     these stay unset for now.
# GOV_PROPOSE_MIN_BASE = "10000000000"
# GOV_TAC_ERC20_MAINNET = "0x..."
# GOV_TAC_ERC20_SIGNET  = "0x..."

# Per-file size cap for /pin (bytes)
MAX_BYTES = "2097152"

# Faucet drip amount (sats per request)
DRIP_SATS = "20000"

# Ethereum RPC endpoints. Legacy mixer recovery endpoints may use these for read-only checks;
# new bridge/DeFi testing uses ConfidentialPool reflection + settle flows.
ETH_RPCS_MAINNET = "https://ethereum-rpc.publicnode.com,https://eth.llamarpc.com,https://1rpc.io/eth,https://eth.drpc.org"
ETH_RPCS_SEPOLIA = "https://ethereum-sepolia-rpc.publicnode.com,https://1rpc.io/sepolia,https://sepolia.drpc.org,https://sepolia.gateway.tenderly.co"

# Legacy tETH mixer addresses (sunset alpha; recovery/migration only). Keep blank by
# default so new Sepolia testing cannot accidentally target TacitBridgeMixer.
TETH_MIXER_MAINNET = ""
TETH_MIXER_SEPOLIA = ""
TETH_UNIT_SCALE = "10000000000"

# Bitcoin signet API base URL
SIGNET_API = "https://mempool.space/signet/api"

# Bitcoin mainnet API base URL (Discover indexer scans both networks)
MAINNET_API = "https://mempool.space/api"

# Cron blocks-per-tick. Signet blocks are near-empty so we can scan many per
# tick; mainnet blocks have ~3000 txs each (paginated 25/page on mempool.space)
# so a single block burns ~120 subrequests. Keep mainnet small to fit Worker
# subrequest budgets; the /assets/hint endpoint covers user-broadcast etches
# instantly regardless.
SCAN_BLOCKS_SIGNET = "5"
SCAN_BLOCKS_MAINNET = "1"

# Faucet rate limits per UTC day
FAUCET_IP_LIMIT = "1"
FAUCET_ADDR_LIMIT = "1"

# Airdrop claim-queue rate limits (per UTC day). Defaults in code are tuned
# for a 50-recipient hobby drop; production drops with thousands of recipients
# need these raised. The defaults bite hardest on:
#   1. AIRDROP_DAILY_LIMIT_ROOT_IP — the issuer's daemon/dapp DELETEs each
#      fulfilled leaf from this IP. For a 3000-recipient drop in batches of 7
#      that's ~430 DELETEs. Default 50 throttles after ~7 batches.
#   2. AIRDROP_DAILY_LIMIT — claimants on shared IPs (mobile carriers, corp
#      NATs) collide on the per-IP global. Default 200 is fine until a single
#      IP fronts hundreds of users.
#   3. AIRDROP_DAILY_LIMIT_ROOT_PUBKEY — a recipient who retries their POST
#      after re-tipping (treasury fund flow) hits this; default 25 allows ~12
#      tip-retry cycles, raise if expecting volatile fee markets / many resubmits.
# Soundness is not affected: the daemon's anti-double-pay still applies. These
# only control how aggressively the worker throttles legitimate traffic.
AIRDROP_DAILY_LIMIT = "500"
AIRDROP_DAILY_LIMIT_ROOT_IP = "5000"
AIRDROP_DAILY_LIMIT_PUBKEY = "200"
AIRDROP_DAILY_LIMIT_ROOT_PUBKEY = "50"
