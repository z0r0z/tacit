<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    cBTC.zk canonical logo. Family resemblance to tacit.svg:
      • Same outer-ring + orange stroke language.
      • Vertical curved stroke (the tacit T's leg) preserved unchanged.
    Bitcoin reference: a second crossbar at y=18 turns the silhouette
    from a plain T into a B-style double-strike — visually telegraphs
    "wrapped Bitcoin" without leaving the tacit palette.
    zk reference: the outer ring is dashed — short bursts of stroke
    suggest a shielded/confidential boundary, distinguishing it from
    tacit.svg's solid ring.
  -->
  <style>
    .r{stroke:#0a0a0a}
    @media(prefers-color-scheme:dark){.r{stroke:#f4efe6}}
  </style>
  <!-- shielded outer ring (zk/private wrapper) -->
  <circle class="r" cx="16" cy="16" r="13" fill="none" stroke-width="2.5" stroke-dasharray="2.4 1.4"/>
  <!-- vertical/curved stroke (matches tacit logo) -->
  <path d="M17.5 7L13 22.5Q13 25 18 24" fill="none" stroke="#f7931a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- upper crossbar (tacit's T) -->
  <path d="M10 11L21 11" stroke="#f7931a" stroke-width="2.4" stroke-linecap="round"/>
  <!-- lower crossbar (Bitcoin ₿-style double-strike → "wrapped BTC") -->
  <path d="M11 18L19.5 18" stroke="#f7931a" stroke-width="2.4" stroke-linecap="round"/>
</svg>
