<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="120" height="120">
  <!--
    cBTC.tac canonical logo. An italic lowercase "b" in the tacit brand's
    hand (stem flowing into a closed bowl, one continuous stroke, same pen
    as the tacit "t"), crossed by a slanted slash at the top of the stem so
    it also reads as the tacit "t" — one glyph, t + b, tacit + Bitcoin.
    Optically centered; Bitcoin-orange #f7931a (the base tacit mark's own
    color). Solid outer ring = the public canonical ERC20, vs cBTC.zk's
    dashed/shielded ring.
  -->
  <style>
    .r{stroke:#0a0a0a}
    @media(prefers-color-scheme:dark){.r{stroke:#f4efe6}}
  </style>
  <circle class="r" cx="16" cy="16" r="13" fill="none" stroke-width="2.5"/>
  <g fill="none" stroke="#f7931a" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16.4 8 L12.9 23 C 18.6 24 21 21.5 21 18.7 C 21 16 17.6 15.2 14.7 15.6" stroke-width="2.8"/>
    <path d="M11.9 13.2 L18.4 11.5" stroke-width="2.4"/>
  </g>
</svg>
